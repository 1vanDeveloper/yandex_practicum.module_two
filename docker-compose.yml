version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.Market
    container_name: spring-boot-app
    ports:
      - "8080:8080" # Внешний порт : Внутренний порт приложения
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_OPTS=-Xmx512m -Xms512m # Ограничение памяти для JVM
      - SPRING_R2DBC_URL=r2dbc:postgresql://market-postgres:5432/market
      - SPRING_R2DBC_USERNAME=user
      - SPRING_R2DBC_PASSWORD=password
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  payments:
    build:
      context: .
      dockerfile: Dockerfile.Payments
    container_name: spring-boot-payments
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_OPTS=-Xmx512m -Xms512m
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  market-postgres:
    container_name: market-postgres
    image: postgres:14
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DBNAME: market
      PGDATA: /data/postgres
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/1-init.sql:ro
      - ./scripts/data.sql:/docker-entrypoint-initdb.d/2-data.sql:ro

  redis:
    image: redis:7-alpine
    container_name: market-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cache:
    driver: local
